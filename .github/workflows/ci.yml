name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: implementations/typescript-lua

jobs:
  validate:
    name: microverse-lua graph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: implementations/typescript-lua/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: implementations/typescript-lua/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, lint, typecheck, test
        run: pnpm run ci:microverse-lua

      - name: Protocol conformance (SurfaceSpec)
        run: |
          pnpm run conformance:export
          pnpm run conformance

      - name: Circular dependency check
        run: pnpm run check:circular
